- name: Deploy to Firebase preview channel
  id: firebase_deploy
  continue-on-error: true
  uses: FirebaseExtended/action-hosting-deploy@v0.10.0
  with:
    repoToken: ${{ secrets.GITHUB_TOKEN }}
    firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AMS_CICT }}
    projectId: ams-cict
    channelId: pr-${{ github.event.pull_request.number }}-dev
    firebaseToolsVersion: 15.22.3

- name: Verify deploy actually succeeded
  if: steps.firebase_deploy.outcome == 'failure'
  run: |
    echo "Action reported failure — verifying actual deploy state..."
    npm install -g firebase-tools@15.22.3
    CHANNEL_INFO=$(firebase hosting:channel:list --project ams-cict --json)
    echo "$CHANNEL_INFO" | grep -q "pr-${{ github.event.pull_request.number }}-dev" && {
      echo "Channel exists and was updated — this is the known duplicate-release bug, not a real failure."
      exit 0
    } || {
      echo "Channel not found or deploy genuinely failed."
      exit 1
    }
  env:
    FIREBASE_TOKEN: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AMS_CICT }}
